<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Launchpad Form</title>
	<meta name="description" content="Launchpad request form.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "IBM Plex Sans", sans-serif;
			color: #1f1d1a;
			background: linear-gradient(160deg, #fbf8f2 0%, #f2ece1 100%);
		}

		.page {
			width: min(1100px, 92vw);
			margin: 0 auto;
			padding: 30px 0 36px;
		}

		h1 {
			margin: 0;
			font-family: "Space Grotesk", sans-serif;
			font-size: clamp(1.7rem, 4vw, 2.5rem);
		}

		p {
			margin: 10px 0 0;
			color: #5f5a52;
		}

		.form-wrap {
			margin-top: 20px;
			background: #fffdf8;
			border: 1px solid #d9cfbf;
			border-radius: 16px;
			padding: 12px;
		}

		.airtable-embed {
			display: block;
			width: 100%;
			min-height: 533px;
			border-radius: 10px;
		}

		.note {
			font-size: 0.92rem;
			margin-top: 10px;
		}
	</style>
</head>
<body>
	<main class="page">
		<h1>Launchpad Request Form</h1>
		<p>Complete the form below and submit your request.</p>
		<section class="form-wrap" aria-label="Launchpad form">
			<iframe class="airtable-embed" src="https://airtable.com/embed/app0EKW78KiZTS3Sd/pag2vZcHOaiXnEVFR/form" frameborder="0" onmousewheel="" width="100%" height="533" style="background: transparent; border: 1px solid #ccc;"></iframe>
		</section>
		<p class="note">If the form does not load, open it directly in Airtable.</p>
	</main>
</body>
</html>
